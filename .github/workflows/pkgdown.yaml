on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

name: Deploy pkgdown

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::pkgdown
            local::.
          needs: website

      - name: Build site
        run: Rscript -e 'pkgdown::build_site()'

      - name: Copy report file to docs
        run: |
          if [ -f inst/examples/risk_report_ggplot2_3.5.2.html ]; then
            mkdir -p docs/examples
            cp inst/examples/risk_report_ggplot2_3.5.2.html docs/examples/
          fi

      - name: Deploy to gh-pages
        if: ${{ (github.ref_name == 'main') || (github.event_name == 'release' && github.event.action == 'published') }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs
          publish_branch: gh-pages